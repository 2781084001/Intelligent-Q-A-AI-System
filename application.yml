spring:
  application:
    name: shengfangzhi-qa
  redis:
    cluster:
      nodes:
        - 192.168.1.101:6379
        - 192.168.1.102:6379
        - 192.168.1.103:6379
    password: your_redis_password
    lettuce:
      pool:
        max-active: 20
        max-idle: 10

# Ollama 配置
ollama:
  base-url: http://localhost:11434
  model:
    code: deepseek-coder:6.7b
    general: qwen:7b

# RocketMQ 配置
rocketmq:
  name-server: 192.168.1.104:9876
  producer:
    group: qa-producer-group

# 多级缓存配置
caffeine:
  spec: maximumSize=1000,expireAfterWrite=60s

# 问答配置
qa:
  max-history-rounds: 5
  retrieval-top-k: 3
  stream-output: true
  timeout-seconds: 15

server:
  port: 8080

logging:
  level:
    com.shengfangzhi: DEBUG
